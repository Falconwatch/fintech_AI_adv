project:
  data_dir: home-credit-default-risk
  artifacts_dir: artifacts
  random_seed: 42

split:
  holdout_size: 0.2

training:
  num_boost_round: 500
  early_stopping_rounds: 50
  cv_folds: 5
  cv_num_boost_round: 300
  cv_early_stopping_rounds: 30
  params:
    objective: binary
    metric: auc
    learning_rate: 0.05
    num_leaves: 31
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    min_data_in_leaf: 50
    verbosity: -1
    seed: 42
  param_grid:
    learning_rate:
      - 0.03
      - 0.05
    num_leaves:
      - 31
      - 63
    min_data_in_leaf:
      - 30
      - 50
    feature_fraction:
      - 0.8
    bagging_fraction:
      - 0.8
